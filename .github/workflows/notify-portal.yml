name: Notify Portal of Doc Changes

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-portal-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_PORTAL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_PORTAL secret is not set, skipping"
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Portal rebuild triggered"
